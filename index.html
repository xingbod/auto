<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auto 导航</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    body {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    h1 {
      margin-bottom: 8px;
      font-size: 2rem;
    }

    p {
      margin-top: 0;
      color: #666;
    }

    ul {
      padding: 0;
      list-style: none;
    }

    li + li {
      margin-top: 12px;
    }

    a {
      display: block;
      padding: 16px 18px;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      color: inherit;
      text-decoration: none;
    }

    a:hover,
    a:focus-visible {
      border-color: #0969da;
      outline: none;
    }
  </style>
</head>
<body>
  <h1>Auto 导航</h1>
  <p>选择一个子项目：</p>
  <ul>
    <li><a href="cnn-history-slides/">cnn-history-slides</a></li>
    <li><a href="spatial-intelligence-slides/">spatial-intelligence-slides</a></li>
  </ul>
</body>
</html>
